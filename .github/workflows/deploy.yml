name: Deploy Theme to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 46.202.158.241
          port: 21
          protocol: ftps
          username: u499412551.silver-gull-152491.hostingersite.com
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./themes/twentytwentyfive/
          server-dir: public_html/wp-content/themes/twentytwentyfive/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/package-lock.json
